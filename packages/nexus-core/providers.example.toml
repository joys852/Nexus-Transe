# LLM providers — copy to %APPDATA%\nexus-ide\providers.toml

# 与 CC Switch / 中转面板一致：Messages API + 无尾斜杠 base_url
active = "relay-messages"

[[providers]]
id = "relay-messages"
name = "中转站 (Messages API)"
protocol = "anthropic_messages"
base_url = "https://your-relay.example.com"
model = "your-model-id"
small_fast_model = "your-model-id"
api_key_env = "RELAY_API_KEY"
proxy_hint = true

[[providers]]
id = "messages-native"
name = "Messages API（原生）"
protocol = "anthropic_messages"
base_url = "https://api.example-native.com"
model = "your-model-id"
api_key_env = "NATIVE_API_KEY"
proxy_hint = false

[[providers]]
id = "chat-completions-relay"
name = "Chat Completions（三方中转）"
protocol = "openai_chat_completions"
base_url = "https://your-relay.example.com/v1"
model = "your-model-id"
api_key_env = "RELAY_API_KEY"
proxy_hint = true

# 本地推理端点示例（Chat Completions 兼容）
[[providers]]
id = "local-inference"
name = "本地推理端点"
protocol = "openai_chat_completions"
base_url = "http://127.0.0.1:11434/v1"
model = "local-model"
api_key_env = "LOCAL_API_KEY"
proxy_hint = false
