[project]
name = "nexus-engine"
version = "1.0.0"
description = "LangGraph agent engine for NexusIDE"
readme = "README.md"
requires-python = ">=3.11,<3.14"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "langgraph>=0.2",
    "langchain-core>=0.3",
    "langchain-openai>=0.2",
    "langchain-anthropic>=0.2",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "httpx>=0.27",
    "cryptography>=43",
    "chromadb>=0.5",
    "jsonschema>=4.23",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.24", "ruff>=0.8"]

[project.scripts]
nexus-engine = "nexus_engine.api.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nexus_engine"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

# 国内 PyPI 镜像（在子目录直接 uv sync 时生效）
[tool.uv]
index-url = "https://pypi.tuna.tsinghua.edu.cn/simple"
python-install-mirror = "https://npmmirror.com/mirrors/python-build-standalone/"
extra-index-url = ["https://mirrors.aliyun.com/pypi/simple/"]
