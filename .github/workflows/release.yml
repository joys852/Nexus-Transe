name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nexus
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: nexus.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: nexus
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p nexus-cli --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-cli-${{ matrix.os }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  build-engine-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - working-directory: packages/nexus-engine
        run: |
          uv sync --extra dev
          uv build
      - uses: actions/upload-artifact@v4
        with:
          name: nexus-engine-wheel
          path: packages/nexus-engine/dist/*.whl

  github-release:
    needs: [build-cli, build-engine-wheel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            LICENSE
            NOTICE
            assets/logo.png
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
